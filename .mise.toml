# mise-en-place — https://mise.jdx.dev
# Pins the Go toolchain and developer tools used by this monorepo.
# Run `mise install` to install everything listed below.

[tools]
go = "1.26.2"
golangci-lint = "2.11.4"
goreleaser = "2.15.3"
"go:github.com/go-task/task/v3/cmd/task" = "latest"
"go:mvdan.cc/gofumpt" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:github.com/securego/gosec/v2/cmd/gosec" = "latest"
git-cliff = "2.7.0"

[env]
CGO_ENABLED = "0"
