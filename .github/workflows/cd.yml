name: Tag Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to release (e.g., v0.1.0)"
        required: true
        type: string

env:
  GO_VERSION: "1.26.2"

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit changelog if changed
        run: |
          DEFAULT_BRANCH=$(git remote show origin | grep "HEAD branch" | awk '{print $NF}')
          echo "Default branch: $DEFAULT_BRANCH"

          git fetch origin "$DEFAULT_BRANCH"
          if git show-ref --verify --quiet "refs/heads/$DEFAULT_BRANCH"; then
            git checkout "$DEFAULT_BRANCH"
            git branch --set-upstream-to="origin/$DEFAULT_BRANCH" "$DEFAULT_BRANCH"
          else
            git checkout -b "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f CHANGELOG.md ]; then
            echo "ERROR: CHANGELOG.md does not exist."
            exit 1
          fi

          if git status --porcelain CHANGELOG.md | grep -q .; then
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG for $GITHUB_REF"
            git push origin "$DEFAULT_BRANCH"
          else
            echo "No changes in CHANGELOG.md."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: generate-changelog
    permissions:
      contents: write
      packages: write
      id-token: write # for sigstore cosign keyless signing
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            services/app/go.sum
            libs/shared/go.sum

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
